<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Pengiriman</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="loadUser()">
    <nav class="navbar">
        <div><strong>SITTA</strong></div>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="stok.html">Informasi Bahan Ajar</a>
            <a href="tracking.html">Tracking Pengiriman</a>
        </div>
        <div>
            <span id="userLogin"></span>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <main class="container">
        <section class="content-card">
            <h2>Tracking Pengiriman Bahan Ajar</h2>
            <label for="nomorDO">Nomor Delivery Order</label>
            <input type="text" id="nomorDO" placeholder="Contoh: 2023001234">
            <button type="button" onclick="cariTracking()">Cari</button>
        </section>

        <section id="hasilTracking" class="content-card" style="display:none;">
            <h3>Hasil Tracking</h3>
            <p><strong>Nama Mahasiswa:</strong> <span id="namaMahasiswa">-</span></p>
            <p>
                <strong>Status Pengiriman:</strong>
                <span id="statusPengiriman" class="status-chip">-</span>
            </p>
            <div class="progress-track">
                <div id="progressValue" class="progress-value"></div>
            </div>

            <h3>Detail Ekspedisi</h3>
            <table>
                <tr><th>Ekspedisi</th><td id="detailEkspedisi">-</td></tr>
                <tr><th>Tanggal Kirim</th><td id="detailTanggal">-</td></tr>
                <tr><th>Jenis Paket</th><td id="detailPaket">-</td></tr>
                <tr><th>Total Pembayaran</th><td id="detailTotal">-</td></tr>
            </table>

            <h3>Riwayat Perjalanan</h3>
            <table>
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Keterangan</th>
                    </tr>
                </thead>
                <tbody id="riwayatPerjalanan"></tbody>
            </table>
        </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
